<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindAR Demo — Targets & QR</title>
    <style>
      :root {
        --bg: #0b1220;
        --panel: rgba(255, 255, 255, 0.06);
        --border: rgba(148, 163, 184, 0.25);
        --text: #f8fafc;
        --muted: #cbd5e1;
        --accent: #67e8f9;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 2rem 1rem;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
      }

      h1 {
        margin: 0;
        font-size: 1.4rem;
        text-align: center;
      }

      p {
        margin: 0;
        color: var(--muted);
        text-align: center;
        max-width: 36rem;
        line-height: 1.5;
      }

      .card {
        width: min(28rem, 100%);
        padding: 1.25rem;
        border-radius: 1rem;
        background: var(--panel);
        border: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.8rem;
      }

      .card h2 {
        margin: 0;
        font-size: 1rem;
        color: var(--accent);
      }

      .card img {
        max-width: 100%;
        border-radius: 0.5rem;
        background: white;
      }

      .targets {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        width: min(36rem, 100%);
      }

      .target {
        padding: 1rem;
        border-radius: 1rem;
        background: var(--panel);
        border: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.6rem;
      }

      .target img {
        width: 100%;
        border-radius: 0.5rem;
        background: white;
      }

      .target span {
        font-size: 0.9rem;
        font-weight: 700;
        color: var(--text);
      }

      .btn {
        margin-top: 0.5rem;
        padding: 0.65rem 1.1rem;
        border-radius: 999px;
        border: 0;
        background: linear-gradient(135deg, #67e8f9, #a5f3fc);
        color: #082f49;
        font-size: 0.95rem;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
      }

      @media print {
        body {
          background: white;
          color: black;
        }
        .card, .target {
          border: 1px solid #ccc;
          background: white;
        }
        .btn {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <h1>MindAR Multi-Target Demo</h1>
    <p>
      Open the main demo on your phone, then point it at either target image below.
    </p>

    <div class="card">
      <h2>Scan to open the demo</h2>
      <img src="qr-code.png" alt="QR code to the demo" width="200" height="200" />
      <a class="btn" href="demo.html">Open demo</a>
    </div>

    <div class="targets">
      <div class="target">
        <img src="target-raccoon.png" alt="Raccoon target" />
        <span>Raccoon Target</span>
      </div>
      <div class="target">
        <img src="target-bear.png" alt="Bear target" />
        <span>Bear Target</span>
      </div>
    </div>

    <p class="note">
      Tip: you can print this page so the targets are always handy.
    </p>
  </body>
</html>
